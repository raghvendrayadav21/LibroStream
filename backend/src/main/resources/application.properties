# =============================================================
#   SmartLMS Backend - Application Configuration
#   QR-Enabled College Library Management System
# =============================================================

# ----- SERVER -----
server.port=8080

# ----- MONGODB CONFIGURATION -----
# MongoDB connection URI: reads from MONGODB_URI env variable (default is local)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartlms}
spring.data.mongodb.database=smartlms

# ----- JWT CONFIGURATION -----
# JWT Secret .env file se aayega (neeche .env.example dekho)
app.jwt.secret=${JWT_SECRET:SmartLMSDefaultSecretKey2026PleaseChangeInProduction}
app.jwt.expiration=86400000

# ----- GMAIL SMTP (OTP Email Sending) -----
# In values ko .env file me daalo (neeche .env.example dekho)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-college-gmail@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:your-16-digit-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ----- APP DEFAULTS (College can override via settings) -----
app.default.penalty.per.day=5.0
app.default.loan.duration.days=14
app.otp.expiry.minutes=10

# ----- LOGGING -----
logging.level.com.smartlms=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN

# ----- CORS (Allow React frontend) -----
app.cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ----- SCHEDULING -----
spring.task.scheduling.pool.size=5
